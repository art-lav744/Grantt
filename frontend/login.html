<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - Tournament 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; padding: 24px; }
        h1 { font-size: 1.5rem; margin-bottom: 24px; }
        form { display: flex; flex-direction: column; gap: 12px; max-width: 360px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        button { padding: 10px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #f0f0f0; }
        #error-msg { color: red; font-size: 0.9rem; display: none; }
        a { color: inherit; font-size: 0.9rem; }
    </style>
</head>
<body>

<h1>Вхід у систему</h1>

<form id="loginForm">
    <input type="email" id="email" placeholder="Електронна пошта" required>
    <input type="password" id="password" placeholder="Пароль" required>
    <button type="submit">Увійти</button>
</form>

<div id="error-msg"></div>
<a href="index.html">← На головну</a>

<script>
    const API = 'http://127.0.0.1:8000';

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('error-msg');
        errorMsg.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Зберігаємо дані в localStorage щоб index.html їх побачив
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('nickname', data.nickname);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('email', data.email);

                // Перенаправляємо на головну
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = data.detail || 'Невірний логін або пароль';
            }
        } catch (err) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Сервер не відповідає. Перевір, чи запущено uvicorn.';
        }
    };
</script>

</body>
</html>
