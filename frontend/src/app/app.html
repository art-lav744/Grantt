<div class="auth-layout" [class.expanded]="isExpanded">
  <aside class="sidebar">
    <button class="sidebar-logo" type="button" (click)="toggleSidebar()" title="Grantt">
      <img src="/assets/logo.png" alt="Grantt" class="logo-img">
      <span class="logo-text" *ngIf="isExpanded">rantt</span>
    </button>

    <nav class="sidebar-nav">
      <a routerLink="/tournaments" routerLinkActive="active" class="nav-item" title="Турніри">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        <span *ngIf="isExpanded">Турніри</span>
      </a>

      <a *ngIf="isLoggedIn" routerLink="/profile" routerLinkActive="active" class="nav-item" title="Профіль">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span *ngIf="isExpanded">Профіль</span>
      </a>

      <a *ngIf="isLoggedIn && isParticipant" routerLink="/dashboard" routerLinkActive="active" class="nav-item" title="Мої команди">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-8 0v2"/><circle cx="12" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M2 21v-2a4 4 0 0 1 3-3.87"/><path d="M8 3.13a4 4 0 0 0 0 7.75"/></svg>
        <span *ngIf="isExpanded">Мої команди</span>
      </a>

      <a *ngIf="isLoggedIn && isJuryOrOrganizer" routerLink="/jury/evaluations" routerLinkActive="active" class="nav-item" title="Оцінювання">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <span *ngIf="isExpanded">Оцінювання</span>
      </a>

      <a *ngIf="isLoggedIn && isAdminOrOrganizer" routerLink="/admin/actions" routerLinkActive="active" class="nav-item" title="Панель">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span *ngIf="isExpanded">Панель</span>
      </a>
    </nav>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <div class="topbar-right" *ngIf="isLoggedIn; else guestLinks">
        <a routerLink="/profile" class="user-info">
          <span class="user-name">{{ userName }}</span>
          <div *ngIf="!profileImage" class="avatar-placeholder">{{ userInitial }}</div>
          <img *ngIf="profileImage" [src]="profileImage" class="avatar-img" alt="Avatar">
        </a>
        <button type="button" class="logout-btn" (click)="logout()">Вийти</button>
      </div>

      <ng-template #guestLinks>
        <div class="guest-links">
          <a routerLink="/login" routerLinkActive="active">Увійти</a>
          <a routerLink="/register" routerLinkActive="active">Зареєструватися</a>
        </div>
      </ng-template>
    </div>

    <div class="messages-container" *ngIf="messages.length > 0">
      <div *ngFor="let msg of messages" [class]="'message ' + msg.type">
        {{ msg.text }}
      </div>
    </div>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
