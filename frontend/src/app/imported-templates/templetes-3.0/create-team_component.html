<div class="registration-container">
  <div class="registration-card">
    <div class="tournament-photo-area">
      <ng-container *ngIf="tournament.imageUrl; else noPhoto">
        <img [src]="tournament.imageUrl" alt="Tournament cover">
      </ng-container>
      <ng-template #noPhoto>
        <div class="photo-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <p>Зображення турніру</p>
        </div>
      </ng-template>
    </div>

    <header class="card-header">
      <h2>Зареєструвати команду на турнір</h2>
    </header>

    <div class="card-body">
      <form [formGroup]="teamForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group">
          <label for="teamName">Назва вашої команди:</label>
          <input 
            id="teamName"
            type="text" 
            formControlName="team_name" 
            class="styled-input" 
            placeholder="Наприклад: CyberDragons">
        </div>

        <div class="info-box">
          <div class="info-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
          </div>
          <p class="info-text">
            Ви як капітан зможете запросити інших учасників за їхнім Email в панелі керування командами після підтвердження реєстрації.
          </p>
        </div>

        <button type="submit" class="btn-submit" [disabled]="teamForm.invalid">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Підтвердити реєстрацію
        </button>
      </form>
    </div>
  </div>
</div>
