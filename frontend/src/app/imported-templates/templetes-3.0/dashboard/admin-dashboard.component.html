<div class="admin-container">
  <div class="header-section fade-in">
    <div class="title-with-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="title-svg"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      <h2 class="page-title">Панель керування</h2>
    </div>
    <div class="header-actions">
      <button class="btn-action primary" routerLink="/tournament/create">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Новий турнір
      </button>
      <button class="btn-action secondary" routerLink="/admin/users">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        Керувати ролями
      </button>
    </div>
  </div>

  <div class="stats-grid fade-in-delayed">
    <div class="stat-card">
      <span class="stat-label">Всього турнірів</span>
      <div class="stat-value text-blue">{{ isLoading ? '...' : tournaments.length }}</div>
    </div>
    <div class="stat-card">
      <span class="stat-label">Користувачів</span>
      <div class="stat-value text-green">{{ isLoading ? '...' : totalUsers }}</div>
    </div>
  </div>

  <h3 class="section-subtitle fade-in-delayed">Активні заходи</h3>

  <div class="tournaments-grid" *ngIf="isLoading">
    <div class="tournament-card skeleton" *ngFor="let item of [1,2,3]"></div>
  </div>

  <div class="tournaments-grid" *ngIf="!isLoading && tournaments.length > 0">
    <div *ngFor="let t of tournaments; let i = index" 
         class="tournament-card-wrapper" 
         [style.animation-delay]="i * 0.1 + 's'">
      <div class="tournament-card">
        <div class="card-header">
          <div class="header-overlay">
            <span class="status-badge">{{ t.status }}</span>
            <div class="registration-dates">
              <p>Керування раундами</p>
              <span class="rounds-count">Кількість: {{ t.rounds?.length || 0 }}</span>
            </div>
          </div>
        </div>

        <div class="card-footer">
          <span class="tournament-title" [title]="t.title">{{ t.title }}</span>
          <div class="admin-controls">
            <button class="control-btn" [routerLink]="['/round/create', t.id]" title="Додати раунд">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="control-btn" [routerLink]="['/tournament/edit', t.id]" title="Налаштування">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            <div class="arrow-icon" [routerLink]="['/tournaments', t.id]">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H19M19 12L12 5M19 12L12 19"/></svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="empty-state fade-in" *ngIf="!isLoading">
      <p>Турнірів поки немає. Створіть перший!</p>
    </div>
  </ng-template>

  <div *ngIf="!isLoading && tournaments.length === 0">
    <ng-container *ngTemplateOutlet="emptyState"></ng-container>
  </div>
</div>
