<div class="tournament-card-wrapper fade-in">
  <div class="tournament-card" [style.border-color]="eval.is_scored ? '#68d39180' : 'rgba(79, 209, 197, 0.5)'">
    
    <div class="card-header-gradient" [style.background]="eval.is_scored ? 'linear-gradient(135deg, #1e3a4d 0%, #276749 100%)' : 'linear-gradient(135deg, #1e3a4d 0%, #2c7a7b 50%, #4fd1c5 100%)'">
      <div class="header-overlay">
        <span class="status-badge" [style.color]="eval.is_scored ? '#68d391' : '#4fd1c5'">
          {{ eval.is_scored ? 'Оцінено' : 'Очікує' }}
        </span>
        <div class="score-preview" *ngIf="eval.is_scored">
          <span class="score-val">{{ eval.total_score }}</span>
          <span class="score-max">/ {{ eval.max_total_score }}</span>
        </div>
      </div>
    </div>

    <div class="card-content">
      <h4 class="team-title" [title]="eval.submission.team.name">{{ eval.submission.team.name }}</h4>
      <p class="round-info">Раунд: <strong>{{ eval.submission.round.title }}</strong></p>
      <p class="description">{{ truncate(eval.submission.description) }}</p>
    </div>

    <div class="card-footer">
      <div class="links-group">
        <a *ngIf="eval.submission.github_link" [href]="eval.submission.github_link" target="_blank" class="icon-link" title="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </a>
        <a *ngIf="eval.submission.video_link" [href]="eval.submission.video_link" target="_blank" class="icon-link" title="Відео">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        </a>
      </div>

      <button class="action-btn" [class.evaluate]="!eval.is_scored" [class.edit]="eval.is_scored">
        <svg *ngIf="!eval.is_scored" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <svg *ngIf="eval.is_scored" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        {{ eval.is_scored ? 'Редагувати' : 'Оцінити' }}
      </button>
    </div>
  </div>
</div>
