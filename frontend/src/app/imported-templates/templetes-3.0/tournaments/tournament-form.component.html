<div class="tournament-container" [@fadeSlide]>
  <div class="figma-card">
    </div>

  <div class="figma-card" [@fadeSlide] *ngIf="isEdit || files.length > 0">
    <div class="card-header">
      <svg>...</svg>
      <h3>Файли турніру ({{ files.length }})</h3>
    </div>

    <div class="table-container">
      <table class="figma-table">
        <thead>
          <tr><th>Назва</th><th>Тип</th><th>Дата</th><th class="text-right">Дії</th></tr>
        </thead>
        <tbody [@listAnimation]="files.length">
          <tr *ngFor="let file of files; let i = index">
            <td class="font-medium">{{ file.title }}</td>
            <td><span class="badge">{{ file.type }}</span></td>
            <td class="text-muted">{{ file.date }}</td>
            <td class="text-right">
              <button class="btn-icon" (click)="deleteFile(i)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
