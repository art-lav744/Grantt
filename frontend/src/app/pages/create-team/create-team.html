<div class="registration-container">
  <div class="registration-card">
    <div class="tournament-photo-area">
      <img *ngIf="tournament?.imageUrl" [src]="tournament.imageUrl" [alt]="tournament?.title">
      <div *ngIf="!tournament?.imageUrl" class="photo-placeholder">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/><path d="M4 22h16"/></svg>
        <p>{{ tournament?.title || 'Турнір' }}</p>
      </div>
    </div>

    <div class="card-header">
      <h2>Реєстрація команди</h2>
      <p *ngIf="tournament">{{ tournament.title }}</p>
    </div>

    <div class="card-body">
      <div *ngIf="loading" class="info-box">Завантаження...</div>
      <div *ngIf="error" class="error-summary">{{ error }}</div>

      <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="save()">
        <div class="form-group">
          <label for="team-name">Назва вашої команди</label>
          <input id="team-name" class="styled-input" formControlName="name" placeholder="Наприклад: CyberDragons">
        </div>

        <div class="info-box">
          <div class="info-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          </div>
          <p class="info-text">
            Разом із капітаном у команді має бути від {{ minMembers }} до {{ maxMembers }} учасників.
          </p>
        </div>

        <div formArrayName="members" class="members-block">
          <div class="members-header">
            <h3>Учасники</h3>
            <button type="button" class="btn-add" (click)="addMember()" [disabled]="!canAddMember || !isRegistrationOpen">Додати учасника</button>
          </div>

          <div class="member-row" *ngFor="let member of members.controls; let i = index" [formGroupName]="i">
            <div class="form-group">
              <label [for]="'member-email-' + i">Email</label>
              <input [id]="'member-email-' + i" class="styled-input" type="email" formControlName="email" placeholder="member@example.com">
            </div>

            <button type="button" class="btn-remove" (click)="removeMember(i)" [disabled]="members.length <= minMembers - 1 || !isRegistrationOpen">Прибрати</button>
          </div>
        </div>

        <div class="action-row">
          <button class="btn-submit" type="submit" [disabled]="form.invalid || saving || !isRegistrationOpen">
            {{ saving ? 'Створення...' : 'Створити та продовжити' }}
          </button>
          <a class="btn-link" [routerLink]="['/tournaments', tournamentId]">Назад до турніру</a>
        </div>
      </form>
    </div>
  </div>
</div>
