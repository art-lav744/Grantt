<div class="tournaments-container">
  <div class="page-header">
    <h1 class="page-title" *ngIf="tournaments.length > 0">Список турнірів</h1>
    <a *ngIf="isAdminOrOrganizer" class="create-tournament-btn" routerLink="/tournaments/create">Створити турнір</a>
  </div>

  <div class="filter-bar" *ngIf="!isLoading && tournaments.length > 0" aria-label="Фільтр турнірів за статусом">
    <button
      *ngFor="let filter of statusFilters"
      type="button"
      class="filter-pill"
      [class.active]="activeStatus === filter.value"
      (click)="applyFilter(filter.value)"
    >
      <span>{{ filter.label }}</span>
      <strong>{{ statusCount(filter.value) }}</strong>
    </button>
  </div>

  <div class="tournaments-grid" *ngIf="!isLoading && filteredTournaments.length > 0; else emptyState">
    <a 
      *ngFor="let t of filteredTournaments"
      class="tournament-card" 
      [routerLink]="['/tournaments', t.id]"
    >
      <div class="card-header" [style.background-image]="t.bannerUrl ? 'url(' + t.bannerUrl + ')' : null">
        <div class="header-overlay">
          <span class="status-badge" [attr.data-status]="t.viewStatus">
            {{ statusLabel(t) }}
          </span>
          <div class="registration-dates">
            <p>Кінець реєстрації</p>
            <span>{{ (t.reg_end | date:'dd.MM.yyyy HH:mm') || '—' }}</span>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <span class="tournament-title">{{ t.title }}</span>
        <div class="arrow-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </a>
  </div>

  <ng-template #emptyState>
    <div class="empty-state" *ngIf="!isLoading && tournaments.length === 0">
      <div class="empty-icon">📂</div>
      <p>Турнірів поки немає.</p>
    </div>
    <div class="loader" *ngIf="isLoading">Завантаження...</div>
    <div class="empty-state" *ngIf="!isLoading && tournaments.length > 0 && filteredTournaments.length === 0">
      <div class="empty-icon">📂</div>
      <p>Немає турнірів з таким статусом.</p>
    </div>
  </ng-template>
</div>
