<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; padding: 24px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        nav { display: flex; gap: 12px; }
        a { color: inherit; text-decoration: none; }
        button { cursor: pointer; padding: 8px 16px; border: 1px solid #ccc; background: white; border-radius: 4px; }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 1.2rem; margin-bottom: 16px; }
        .tournaments { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
        .card h3 { margin-bottom: 8px; }
        .card p { font-size: 0.9rem; color: #555; margin-bottom: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 8px; }
        .badge-registration { background: #e0f0ff; color: #0066cc; }
        .badge-running { background: #e0ffe0; color: #006600; }
        .badge-finished { background: #f0f0f0; color: #555; }
        .badge-draft { background: #fff8e0; color: #996600; }
        #user-block { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 32px; }
    </style>
</head>
<body>

<header>
    <h1>Tournament 2026</h1>
    <nav>
        <div id="guest-nav">
            <a href="login.html"><button>Увійти</button></a>
            <a href="register.html"><button>Реєстрація</button></a>
        </div>
        <div id="user-nav" style="display:none; gap:12px; align-items:center;">
            <span id="greeting"></span>
            <button onclick="logout()">Вийти</button>
        </div>
    </nav>
</header>

<div id="user-block" style="display:none;">
    <h2>Мій турнір</h2>
    <p id="user-tournament">Заванта
