<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід - Tournament 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #16213e; padding: 40px; border-radius: 15px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #4ecca3; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #0f3460; background: #0f3460; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; border-radius: 6px; border: none; background: #4ecca3; color: #1a1a2e; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #45b393; }
        .back-link { display: block; margin-top: 15px; color: #999; text-decoration: none; font-size: 0.9em; }
        #error-msg { color: #e94560; margin-top: 15px; font-size: 0.9em; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Вхід у систему</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Електронна пошта" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button type="submit">Увійти</button>
    </form>
    <div id="error-msg"></div>
    <a href="index.html" class="back-link">← На головну</a>
</div>

<script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('error-msg');
        errorMsg.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            // Викликаємо твій API ендпоінт для логіну
            const response = await fetch('http://127.0.0.1:8000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                // Зберігаємо дані в LocalStorage, щоб index.html їх побачив
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('nickname', data.nickname);
                localStorage.setItem('user_id', data.user_id);

                // Перенаправляємо на головну
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = data.detail || 'Невірний логін або пароль';
            }
        } catch (err) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Сервер не відповідає. Перевір, чи запущено uvicorn.';
        }
    };
</script>

</body>
</html>
