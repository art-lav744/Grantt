{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-primary">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Додати учасника до команди "{{ team.name }}"</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="full_name">Повне ім'я учасника</label>
                            <input type="text" name="full_name" id="full_name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="member_email">Email</label>
                            <input type="email" name="email" id="member_email" class="form-control" required>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success">Додати в команду</button>
                            <a href="{% url 'team_dashboard' %}" class="btn btn-link text-secondary">Назад до кабінету</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
