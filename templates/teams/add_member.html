{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-primary">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Запросити учасника до команди "{{ team.name }}"</h4>
                </div>

                <form method="post" action="{% url 'send_invite_action' team.id %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="email">Email учасника:</label>
                        <input type="email" name="email" id="email" class="form-control" required placeholder="example@gmail.com">
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-success">Надіслати запрошення</button>
                        <a href="{% url 'team_detail' team.id %}" class="btn btn-link text-secondary">Скасувати</a>
                    </div>
                </form>>

                <div style="margin-top: 20px; padding: 15px; background: #eef7ff; border-radius: 8px;">
                    <small>ℹ️ Учасник отримає лист на Gmail із посиланням для вступу в команду.</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
