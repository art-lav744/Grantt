{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 700px; margin: 40px auto;">
    <div class="card" style="padding: 30px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1);">
        <h2 style="border-bottom: 2px solid #007bff; padding-bottom: 15px; margin-bottom: 25px;">
            {% if tournament %}⚙️ Налаштування турніру{% else %}➕ Новий турнір{% endif %}
        </h2>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}<small style="color: #666;">{{ field.help_text }}</small>{% endif %}
                </div>
            {% endfor %}
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn" style="flex: 2; background: #28a745;">Зберегти</button>
                <a href="{% url 'dashboard' %}" class="btn" style="flex: 1; background: #6c757d; text-align: center;">Назад</a>
            </div>
        </form>
    </div>
</div>
<script>
    const taskTypeSelect = document.querySelector('select[name="task_type"]');
    const maxRoundsInput = document.querySelector('input[name="max_rounds"]');

    function adjustRounds() {
        if (taskTypeSelect.value === 'single') {
            maxRoundsInput.value = 1;
            maxRoundsInput.readOnly = true; // Забороняємо змінювати
            maxRoundsInput.style.backgroundColor = '#e9ecef';
        } else {
            maxRoundsInput.readOnly = false;
            maxRoundsInput.style.backgroundColor = '#fff';
        }
    }

    taskTypeSelect.addEventListener('change', adjustRounds);
    window.addEventListener('load', adjustRounds); // Перевірка при завантаженні
</script>
{% endblock %}
