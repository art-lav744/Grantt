<div class="submission-card">
  <h2>Подати роботу для команди {{ teamName }}</h2>
  <form [formGroup]="submissionForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>GitHub Link</label>
      <input formControlName="github_link" class="form-control" type="url">
    </div>
    
    <div class="form-group">
      <label>Video Link (Optional)</label>
      <input formControlName="video_link" class="form-control" type="url">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea formControlName="description" class="form-control"></textarea>
    </div>

    <button class="btn btn-submit" type="submit" [disabled]="!submissionForm.valid">Надіслати</button>
  </form>
</div>
