<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-primary">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Додати учасника до команди "{{ teamName }}"</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="addMemberForm" (ngSubmit)="onSubmit()">
            
            <div class="form-group">
              <label for="full_name">Повне ім'я учасника</label>
              <input 
                type="text" 
                id="full_name" 
                formControlName="fullName" 
                class="form-control" 
                [class.is-invalid]="addMemberForm.get('fullName')?.touched && addMemberForm.get('fullName')?.invalid"
              >
            </div>

            <div class="form-group">
              <label for="member_email">Email</label>
              <input 
                type="email" 
                id="member_email" 
                formControlName="email" 
                class="form-control"
                [class.is-invalid]="addMemberForm.get('email')?.touched && addMemberForm.get('email')?.invalid"
              >
            </div>

            <div class="mt-4">
              <button 
                type="submit" 
                class="btn btn-success" 
                [disabled]="addMemberForm.invalid"
              >
                Додати в команду
              </button>
              <button 
                type="button" 
                class="btn btn-link text-secondary" 
                (click)="goBack()"
              >
                Назад до кабінету
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
