<div class="card header-card">
  <h1>{{ isEdit ? 'Редагувати раунд' : 'Створити раунд' }}</h1>
  <p><strong>Турнір:</strong> {{ tournament.title }}</p>
</div>

<div class="card">
  <form [formGroup]="roundForm" (ngSubmit)="submit()">
    <div class="form-group">
      <label>Назва раунду</label>
      <input type="text" formControlName="title" class="form-control">
    </div>

    <div class="form-group">
      <label>Опис раунду</label>
      <textarea formControlName="description" class="form-control" rows="4"></textarea>
    </div>

    <div class="form-group">
      <label>Дедлайн</label>
      <input type="datetime-local" formControlName="deadline" class="form-control">
    </div>

    <div class="btn-group-row">
      <button type="submit" class="btn" [disabled]="roundForm.invalid">
        {{ isEdit ? 'Зберегти зміни' : 'Створити раунд' }}
      </button>
      <button type="button" class="btn btn-secondary">Назад до турніру</button>
    </div>
  </form>
</div>
