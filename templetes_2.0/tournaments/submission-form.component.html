<div class="card submission-card">
  <h2>Подати роботу для команди {{ teamName }}</h2>
  
  <form [formGroup]="submissionForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="github_link">GitHub репозиторій</label>
      <input type="url" id="github_link" formControlName="githubLink" placeholder="https://github.com/..." class="form-control">
      <div *ngIf="submissionForm.get('githubLink')?.touched && submissionForm.get('githubLink')?.invalid" class="error">
        Вкажіть коректне посилання на GitHub
      </div>
    </div>

    <div class="form-group">
      <label for="video_link">Відео презентація (необов'язково)</label>
      <input type="url" id="video_link" formControlName="videoLink" placeholder="https://youtube.com/..." class="form-control">
    </div>

    <div class="form-group">
      <label for="description">Опис рішення</label>
      <textarea id="description" formControlName="description" rows="5" class="form-control"></textarea>
    </div>

    <button class="btn btn-submit" type="submit" [disabled]="submissionForm.invalid">Надіслати</button>
  </form>
</div>
