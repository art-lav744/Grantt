<div class="container">
  <div class="card form-card">
    <h2>{{ isEdit ? '⚙️ Налаштування турніру' : '➕ Новий турнір' }}</h2>
    
    <form [formGroup]="tournamentForm" (ngSubmit)="saveTournament()">
      <div class="form-group">
        <label>Назва турніру</label>
        <input type="text" formControlName="title" class="form-control">
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Початок реєстрації</label>
          <input type="datetime-local" formControlName="reg_start" class="form-control">
        </div>
        <div class="form-group">
          <label>Кінець реєстрації</label>
          <input type="datetime-local" formControlName="reg_end" class="form-control">
        </div>
      </div>

      <div class="button-group">
        <button type="submit" class="btn btn-save" [disabled]="tournamentForm.invalid">Зберегти</button>
        <button type="button" class="btn btn-back">Назад</button>
      </div>
    </form>
  </div>

  <div class="card file-card" *ngIf="isEdit || true">
    <h3>📎 Файли турніру</h3>
    <form [formGroup]="fileForm" (ngSubmit)="uploadFile()" class="upload-flex">
      <input type="text" formControlName="fileTitle" placeholder="Назва файлу">
      <input type="file" (change)="null">
      <button class="btn" [disabled]="fileForm.invalid">Завантажити</button>
    </form>

    <table class="file-table mt-4">
      <thead>
        <tr><th>Назва</th><th>Тип</th><th>Дата</th><th>Дії</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let file of files">
          <td>{{ file.title }}</td>
          <td>{{ file.type }}</td>
          <td>{{ file.date }}</td>
          <td><button class="btn btn-sm">Відкрити</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
