<div class="admin-container">
  <div class="header-section fade-in">
    <div class="title-with-icon">
      <h2 class="page-title">Панель Організатора</h2>
    </div>
    <div class="header-actions">
      <button class="btn-action primary" routerLink="/tournaments/create">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Новий турнір
      </button>
    </div>
  </div>

  <div class="stats-grid fade-in-delayed">
    <div class="stat-card">
      <span class="stat-label">Усі турніри</span>
      <div class="stat-value text-blue">{{ tournaments.length }}</div>
    </div>
    <div class="stat-card">
      <span class="stat-label">Користувачі</span>
      <div class="stat-value text-green">{{ totalUsers }}</div>
    </div>
  </div>

  <div class="staff-card-container fade-in-delayed">
    <h3 class="section-subtitle">Створити обліковий запис персоналу</h3>
    <form [formGroup]="staffForm" (ngSubmit)="onCreateStaff()" class="staff-form-row">
      <input formControlName="email" type="email" placeholder="Email" class="form-input">
      <select formControlName="role" class="form-input select-input">
        <option value="jury">Журі</option>
        <option value="admin">Адміністратор</option>
      </select>
      <button type="submit" class="btn-confirm" [disabled]="staffForm.invalid">Створити</button>
    </form>
  </div>

  <h3 class="section-subtitle fade-in-delayed">Активні заходи</h3>
  
  <div class="tournaments-grid">
    <div *ngFor="let t of tournaments; let i = index" 
         class="tournament-card-wrapper" 
         [style.animation-delay]="i * 0.1 + 's'">
      <div class="tournament-card">
        <div class="card-header">
          <div class="header-overlay">
            <span class="status-badge">{{ t.status }}</span>
            <div class="registration-dates">
              <p>Кількість команд</p>
              <span class="rounds-count">{{ t.teams_count }}</span>
            </div>
          </div>
        </div>

        <div class="card-footer">
          <span class="tournament-title" [title]="t.title">{{ t.title }}</span>
          <div class="admin-controls">
            <button class="control-btn" title="Оцінити">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
            <button class="control-btn" [routerLink]="['/tournaments/edit', t.id]" title="Редагувати">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
            <div class="arrow-icon-circle" [routerLink]="['/tournaments', t.id]">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0d1b2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
