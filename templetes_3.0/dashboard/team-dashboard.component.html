<div class="dashboard-container p-4">
  <header class="dashboard-header mb-4">
    <h1 class="d-flex align-items-center gap-2">
      <svg class="header-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      Мої команди
    </h1>
  </header>

  <section class="mb-5">
    <div class="teams-grid">
      <div class="team-card" 
           *ngFor="let t of myTeams" 
           (click)="selectTeam(t.id)"
           [class.selected]="selectedTeam?.id === t.id">
        
        <div class="card-main-content">
          <div class="team-icon-wrapper">
            <img [src]="t.image || 'assets/team-placeholder.png'" alt="Team Icon">
          </div>
          <h3 class="team-name">{{ t.name }}</h3>
        </div>
        
        <div class="card-footer">
          <div class="tournament-info">
            <svg class="footer-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
              <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
              <path d="M4 22h16"/>
              <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
              <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
              <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
            </svg>
            <span class="truncate">{{ t.tournament.title }}</span>
          </div>
          
          <div class="role-tag" [class.captain]="t.captain?.id === 1">
            <svg *ngIf="t.captain?.id === 1" class="footer-icon-svg captain-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7Zm3 16h14"/>
            </svg>
            <svg *ngIf="t.captain?.id !== 1" class="footer-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span>{{ t.captain?.id === 1 ? 'Капітан' : 'Учасник' }}</span>
          </div>

          <div class="action-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="row g-4" *ngIf="selectedTeam">
    </div>
</div>
