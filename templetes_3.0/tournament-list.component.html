<div class="tournaments-container">
  <h1 class="page-title" *ngIf="tournaments.length > 0">Список турнірів</h1>

  <div class="tournaments-grid" *ngIf="!isLoading && tournaments.length > 0; else emptyState">
    <a 
      *ngFor="let t of tournaments" 
      class="tournament-card" 
      [routerLink]="['/tournaments', t.id]"
    >
      <div class="card-header">
        <div class="header-overlay">
          <span class="status-badge" [attr.data-status]="t.status">
            {{ t.status }}
          </span>
          <div class="registration-dates">
            <p>Кінець реєстрації</p>
            <span>{{ (t.reg_end | date:'dd.MM.yyyy HH:mm') || '—' }}</span>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <span class="tournament-title">{{ t.title }}</span>
        <div class="arrow-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </a>
  </div>

  <ng-template #emptyState>
    <div class="empty-state" *ngIf="!isLoading">
      <div class="empty-icon">📂</div>
      <p>Турнірів поки немає.</p>
    </div>
    <div class="loader" *ngIf="isLoading">Завантаження...</div>
  </ng-template>
</div>
