<div class="table-responsive" *ngIf="users.length > 0; else noUsers">
  <table class="table align-middle">
    </table>
</div>

<ng-template #noUsers>
  <div class="p-5 text-center text-muted">
    <i class="fas fa-user-clock fa-3x mb-3"></i>
    <p>Завантаження користувачів або список порожній...</p>
  </div>
</ng-template>

<div class="list-group list-group-flush" *ngIf="assignments.length > 0; else noAssignments">
  <div *ngFor="let a of assignments" class="list-group-item ...">
    </div>
</div>

<ng-template #noAssignments>
  <div class="p-4 text-center text-muted">
    <small>Активні призначення відсутні</small>
  </div>
</ng-template>
